# Stack Docker — dev local + déploiement Hostinger / VPS
# Hostinger : définir APP_PORT=80, JWT_SECRET, POSTGRES_PASSWORD dans les variables d'environnement du panneau.

services:
  db:
    image: postgres:16-alpine
    container_name: jardinia-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - jardinia_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: jardinia-backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/postgres}
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      SERVE_STATIC: "false"
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      APP_ID: ${APP_ID:-jardinia}
      TRUST_PROXY: "true"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_TEXT_MODEL: ${GEMINI_TEXT_MODEL:-gemini-2.5-flash}
      GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL:-gemini-2.5-flash-image}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      OWNER_EMAIL: ${OWNER_EMAIL:-}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-}
        VITE_APP_ID: ${APP_ID:-jardinia}
        VITE_ANALYTICS_ENDPOINT: ${VITE_ANALYTICS_ENDPOINT:-}
        VITE_ANALYTICS_WEBSITE_ID: ${VITE_ANALYTICS_WEBSITE_ID:-}
    container_name: jardinia-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8090}:80"
    depends_on:
      - backend

volumes:
  jardinia_pg_data:
