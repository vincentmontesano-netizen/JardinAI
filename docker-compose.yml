version: "3.8"

name: jardinia

# Stack Docker — dev local + déploiement Hostinger / VPS
# Hostinger (panneau) : JWT_SECRET, POSTGRES_PASSWORD, APP_PORT=80, GEMINI_API_KEY,
# OWNER_EMAIL, ADMIN_SEED_PASSWORD, STRIPE_SECRET_KEY
# Ne PAS définir DATABASE_URL ni DB_HOST dans le panneau (hôte obsolète supabase-db / jardinia-db).
# Ancien déploiement Supabase/PG15 : supprimer le projet Hostinger puis redéployer (volume jardinia_pg_v2).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - jardinia_pg_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        APP_BUILD_ID: ${APP_BUILD_ID:-local}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-postgres}
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      SERVE_STATIC: "false"
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      APP_ID: ${APP_ID:-jardinia}
      TRUST_PROXY: "true"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_TEXT_MODEL: ${GEMINI_TEXT_MODEL:-gemini-2.5-flash}
      GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL:-gemini-2.5-flash-image}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      OWNER_EMAIL: ${OWNER_EMAIL:-}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-}
    depends_on:
      - db
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- 'http://127.0.0.1:3000/api/trpc/system.health?input=%7B%22json%22%3A%7B%22timestamp%22%3A0%7D%7D' | grep -q '\"ok\":true' || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-}
        VITE_APP_ID: ${APP_ID:-jardinia}
        VITE_ANALYTICS_ENDPOINT: ${VITE_ANALYTICS_ENDPOINT:-}
        VITE_ANALYTICS_WEBSITE_ID: ${VITE_ANALYTICS_WEBSITE_ID:-}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  jardinia_pg_v2:
